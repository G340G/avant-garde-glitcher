name: Generate Avant-Garde Video

on:
  workflow_dispatch:
    inputs:
      input_video_path:
        description: 'Name of the video file inside the repo (e.g., input.mp4)'
        required: true
        default: 'input.mp4'
      pframe_intensity:
        description: 'Datamosh & macroblock corruption (0.0 - 1.0)'
        required: false
        default: '0.5'
      color_intensity:
        description: 'Analog color separation depth (0.0 - 1.0)'
        required: false
        default: '0.4'
      glitch_frequency:
        description: 'Glitch rhythm frequency/chaos bursts (0.0 - 1.0)'
        required: false
        default: '0.5'

jobs:
  glitch-art-engine:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Process Video via Glitch Engine
      run: |
        python main.py \
          -i "${{ github.event.inputs.input_video_path }}" \
          -o "glitched_output.mp4" \
          --pframe ${{ github.event.inputs.pframe_intensity }} \
          --color ${{ github.event.inputs.color_intensity }} \
          --frequency ${{ github.event.inputs.glitch_frequency }}

    - name: Upload Glitched Video Artifact
      uses: actions/upload-artifact@v4
      with:
        name: avant-garde-glitched-video
        path: glitched_output.mp4
        retention-days: 5
